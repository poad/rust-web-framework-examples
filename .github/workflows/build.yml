name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch: null
env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - {project: 'actix-example', target: 'x86_64'}
          - {project: 'actix-example', target: 'aarch64'}
          - {project: 'axum-example', target: 'x86_64'}
          - {project: 'axum-example', target: 'aarch64'}
          - {project: 'rocket-example', target: 'x86_64'}
          - {project: 'rocket-example', target: 'aarch64'}

    steps:
    - name: Update Rust toolchain
      run: rustup update
    - name: Update Rust toolchain
      run: rustup target add ${{ matrix.config.target }}-unknown-linux-gnu
    - name: Install cross
      run: |
        curl -L --fail --retry 3 --retry-delay 2 -o /tmp/cross.tar.gz https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz
        mkdir -p /tmp/cross-bin "$HOME/.cargo/bin"
        tar -xzf /tmp/cross.tar.gz -C /tmp/cross-bin
        install -m 0755 /tmp/cross-bin/cross "$HOME/.cargo/bin/cross"
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Build
      working-directory: ${{ matrix.config.project }}
      run: cross build --target=${{ matrix.config.target }}-unknown-linux-gnu
